# Any property can be overwritten from the command line via -P<propertyName>=<value>

DotnetPluginId=Sparkitect.RiderPlugin
DotnetSolution=src/dotnet/Sparkitect.RiderPlugin.slnx

# Reverse-DNS plugin id. Placeholder until the user-controlled DNS prefix is confirmed.
RiderPluginId=Sparkitect.RiderPlugin

PluginVersion=0.1.0

BuildConfiguration=Debug

# Stable Rider SDK matching the installed Rider 2026.1.2 (build 261.x).
ProductVersion=2026.1.2

# rd line for the rdgen channel. Held equal to ProductVersion so the rdgen plugin,
# the rd-gen/rd-framework artifacts, and the engine-side JetBrains.RdFramework NuGet
# all share one wire ABI (avoids the classic rd version-skew handshake failure).
rdVersion=2026.1.2

# Avoid bundling the Kotlin stdlib that ships with the IDE.
kotlin.stdlib.default.dependency=false

# Download Rider artifacts from Maven rather than the binary-release CDN.
org.jetbrains.intellij.platform.buildFeature.useBinaryReleases=false
